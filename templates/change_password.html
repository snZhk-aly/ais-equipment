{% extends "base.html" %}

{% block page_title %}Смена пароля{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="form-container">
        <h2><i class="fas fa-key"></i> Смена пароля</h2>
        
        <form method="post">
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Текущий пароль</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Новый пароль</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Подтверждение пароля</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Сохранить</button>
                <a href="{{ url_for('profile') }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Назад</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        var newPass = document.querySelector('[name="new_password"]').value;
        var confirmPass = document.querySelector('[name="confirm_password"]').value;
        if (newPass !== confirmPass) {
            e.preventDefault();
            alert('Новый пароль и подтверждение не совпадают');
        }
    });
</script>
{% endblock %}

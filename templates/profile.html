{% extends "base.html" %}

{% block page_title %}Мой профиль{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="form-container">
        <h2><i class="fas fa-id-card"></i> Личный кабинет</h2>

        <form method="post">
            <div class="form-group">
                <label><i class="fas fa-user"></i> ФИО</label>
                <input type="text" name="full_name" class="form-control" value="{{ user.full_name }}">
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Телефон</label>
                <input type="text" name="phone" class="form-control" value="{{ user.phone }}">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Логин (нельзя изменить)</label>
                <input type="text" class="form-control" value="{{ user.username }}" disabled>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Сохранить данные</button>
                <a href="{{ url_for('change_password') }}" class="btn btn-outline"><i class="fas fa-key"></i> Сменить пароль</a>
                <a href="{{ url_for('logout') }}" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Выйти</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
